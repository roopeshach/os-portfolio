<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#02020a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0b0b1e;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0, 216, 255, 0.05)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:rgba(0, 216, 255, 0.1)" />
      <stop offset="100%" style="stop-color:rgba(0, 0, 0, 0)" />
    </radialGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bg)" />
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <circle cx="50%" cy="50%" r="600" fill="url(#glow)" />
  
  <!-- Cyber Circles -->
  <g stroke="rgba(0, 216, 255, 0.1)" stroke-width="2" fill="none">
    <circle cx="50%" cy="50%" r="200" stroke-dasharray="100 50" opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0 960 540" to="360 960 540" dur="60s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50%" cy="50%" r="350" stroke-dasharray="20 20" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="360 960 540" to="0 960 540" dur="80s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50%" cy="50%" r="500" stroke-width="1" opacity="0.2" />
  </g>

  <!-- Abstract HUD Elements -->
  <path d="M 100 100 L 200 100 L 220 120" stroke="#00d8ff" stroke-width="2" fill="none" opacity="0.5" />
  <rect x="100" y="130" width="10" height="10" fill="#00d8ff" opacity="0.5" />
  <rect x="120" y="130" width="10" height="10" fill="#00d8ff" opacity="0.3" />
  <rect x="140" y="130" width="10" height="10" fill="#00d8ff" opacity="0.1" />

  <path d="M 1820 980 L 1720 980 L 1700 960" stroke="#00d8ff" stroke-width="2" fill="none" opacity="0.5" />
</svg>
